name: Build and deploy ASP.NET Core app to Azure Web App - rjms

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./RJMS/RJMS.csproj

      - name: Build
        run: dotnet build ./RJMS/RJMS.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./RJMS/RJMS.csproj --configuration Release --no-build --output "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5F865869F4214F7E939D6ACD73F0B1E1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_335AA64B29A44453863F503687FBE4CB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6A2BE3A4482549E9B681C52E561DCC0E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rjms'
          slot-name: 'Production'
          package: .
